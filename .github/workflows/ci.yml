name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore DevToolsUno.sln

      - name: Build
        run: dotnet build DevToolsUno.sln -c Release --no-restore

      - name: Pack
        run: dotnet pack src/DevToolsUno/DevToolsUno.csproj -c Release -o artifacts/packages --no-restore -p:ContinuousIntegrationBuild=true

      - name: Upload Packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: artifacts/packages/*
          if-no-files-found: error
