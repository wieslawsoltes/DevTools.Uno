name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore DevTools.Uno.sln

      - name: Build
        run: dotnet build DevTools.Uno.sln -c Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Pack
        env:
          PACKAGE_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${PACKAGE_VERSION#v}"
          dotnet pack src/DevTools.Uno/DevTools.Uno.csproj \
            -c Release \
            -o artifacts/packages \
            --no-restore \
            -p:ContinuousIntegrationBuild=true \
            -p:Version="$VERSION"

      - name: Publish To NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          for package in artifacts/packages/*.nupkg; do
            if [[ "$package" == *.snupkg ]]; then
              continue
            fi
            dotnet nuget push "$package" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --symbol-source https://api.nuget.org/v3/index.json \
              --symbol-api-key "$NUGET_API_KEY" \
              --skip-duplicate
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          generate_release_notes: true
